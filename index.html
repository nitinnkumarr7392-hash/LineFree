<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SplitEasy - Smart Bill Splitter</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="card">
        <h1>💸 SplitEasy</h1>
        <p class="subtitle">Smart & Simple Bill Splitter</p>

        <div class="input-group">
            <label>Total Amount (₹)</label>
            <input type="number" id="totalAmount" placeholder="Enter total amount">
        </div>

        <div class="input-group">
            <label>Number of People</label>
            <input type="number" id="peopleCount" placeholder="Enter number of people">
        </div>

        <div class="options">
            <label>
                <input type="checkbox" id="includeTip">
                Include 10% Tip
            </label>
        </div>

        <button onclick="calculateSplit()">Calculate</button>

        <div class="result" id="resultBox">
            <h2>Each Person Pays</h2>
            <p id="perPersonAmount">₹0</p>
        </div>

    </div>
</div>

<script src="script.js"></script>
</body>
</html>
