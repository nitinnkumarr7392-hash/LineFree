<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LineFree - लाइन की स्थिति चेक करें</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.6.0/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <header>
            <h1>🟢 LineFree</h1>
            <p>अपनी location select करें, nearby queues check करें!</p>
        </header>

        <div class="search-section">
            <input type="text" id="searchInput" placeholder="Nearby जगह सर्च करें... (Hospital, Bank etc.)">
            <div class="categories">
                <button class="cat-btn active" data-cat="all">सभी</button>
                <button class="cat-btn" data-cat="hospital">🏥 Hospital</button>
                <button class="cat-btn" data-cat="bank">🏦 Bank</button>
                <button class="cat-btn" data-cat="govt">🏢 Govt Office</button>
                <button class="cat-btn" data-cat="temple">🛕 Temple</button>
            </div>
        </div>

        <div id="map"></div>

        <div class="places-list" id="placesList">
            <!-- Dynamic places yahan load honge -->
        </div>

        <!-- Detail Modal -->
        <div class="modal" id="detailModal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2 id="placeName"></h2>
                <div id="queueStatus"></div>
                <p id="estTime"></p>
                <p id="lastUpdated"></p>
                <div class="update-section">
                    <label>आपसे पहले कितने लोग?</label>
                    <input type="number" id="peopleAhead" min="0" max="100" value="5">
                    <button id="updateBtn">Queue Update करें 🟢</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.6.0/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
