<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LineFree - Smart Queue Checker</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="splash">
    <h1>LineFree</h1>
    <p>Smart Queue Checker</p>
</div>

<div class="app hidden">

<header>
    <div>
        <h2>LineFree</h2>
        <small>Check queue before you go</small>
    </div>
    <button id="themeToggle">🌙</button>
</header>

<div class="search-section">
    <input type="text" id="searchInput" placeholder="Search place...">
    <button id="addPlaceBtn">＋</button>
</div>

<div class="categories">
    <button data-cat="All" class="active">All</button>
    <button data-cat="Hospital">Hospital</button>
    <button data-cat="Bank">Bank</button>
    <button data-cat="Temple">Temple</button>
    <button data-cat="Govt">Govt</button>
</div>

<div id="placesContainer" class="places"></div>

</div>

<!-- Modal -->
<div id="modal" class="modal hidden">
  <div class="modal-box">
      <h3 id="modalTitle"></h3>
      <input type="number" id="peopleInput" placeholder="People ahead of you">
      <select id="categorySelect">
          <option value="Hospital">Hospital</option>
          <option value="Bank">Bank</option>
          <option value="Temple">Temple</option>
          <option value="Govt">Govt</option>
      </select>
      <button id="submitBtn">Submit</button>
      <button id="closeBtn" class="cancel">Cancel</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
